<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>量贩零食城市门店地图</title>
  <style>
    :root{--ink:#102326;--muted:#647579;--line:#d9ddd5;--paper:#f7f5ed;--panel:#fffdf6;--green:#0f6b4a;--red:#b74335;--gold:#bb7d13;--blue:#2a6f8f;--shadow:0 18px 42px rgba(30,42,35,.14)}
    *{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:"Microsoft YaHei","Noto Sans CJK SC","PingFang SC",sans-serif;letter-spacing:0}
    header{padding:30px 34px 20px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.78),rgba(248,246,238,.9))}h1{margin:0 0 8px;font-size:31px;line-height:1.15}.sub{color:var(--muted);font-size:14px;line-height:1.7}
    .wrap{padding:24px 34px 10px}.panel{border:1px solid var(--line);border-radius:8px;background:rgba(255,253,246,.92);box-shadow:var(--shadow)}.matrix-panel{padding:20px}.section-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:16px}.section-head h2{font-size:21px;line-height:1.2;margin:0 0 6px}.section-head p{margin:0;color:var(--muted);font-size:13px;line-height:1.65}.matrix-legend{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:12px}.legend-dot{display:inline-flex;align-items:center;gap:5px;white-space:nowrap}.legend-dot:before{content:"";width:10px;height:10px;border-radius:50%;background:var(--red);box-shadow:0 0 0 2px #fff,0 0 0 3px rgba(16,35,38,.16)}.legend-dot.low:before{background:var(--blue)}.matrix{position:relative;min-height:390px;aspect-ratio:16/8.8;border:1px solid var(--line);border-radius:8px;background:linear-gradient(90deg,rgba(42,111,143,.06) 0 50%,rgba(15,107,74,.06) 50% 100%),linear-gradient(0deg,rgba(42,111,143,.05) 0 50%,rgba(183,67,53,.06) 50% 100%);overflow:hidden}.matrix:before,.matrix:after{content:"";position:absolute;background:rgba(16,35,38,.2)}.matrix:before{left:50%;top:0;bottom:0;width:1px}.matrix:after{left:0;right:0;top:50%;height:1px}.axis{position:absolute;color:#526164;font-size:12px;font-weight:850;letter-spacing:0;background:rgba(255,253,246,.76);padding:4px 7px;border:1px solid rgba(217,221,213,.8);border-radius:999px}.axis-y-top{left:12px;top:10px}.axis-y-bottom{left:12px;bottom:10px}.axis-x-left{left:12px;bottom:44%;transform:translateY(50%)}.axis-x-right{right:12px;bottom:44%;transform:translateY(50%)}.quadrant-label{position:absolute;color:rgba(16,35,38,.42);font-size:13px;font-weight:850}.q1{right:18px;top:18px}.q2{left:18px;top:18px}.q3{left:18px;bottom:18px}.q4{right:18px;bottom:18px}.city-dot{position:absolute;transform:translate(-50%,50%);text-decoration:none;color:var(--ink);display:flex;align-items:center;gap:8px;z-index:3;max-width:245px}.city-dot .bubble{width:var(--size);height:var(--size);border-radius:50%;background:var(--color);border:3px solid #fff;box-shadow:0 8px 18px rgba(20,35,32,.22);flex:none}.city-dot .tag{padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:rgba(255,253,246,.95);box-shadow:0 9px 20px rgba(30,42,35,.12)}.city-dot strong{display:block;font-size:14px;line-height:1.25}.city-dot span{display:block;margin-top:3px;color:#647579;font-size:12px;line-height:1.35}.city-dot:hover .tag{border-color:#9aa99f}.matrix-summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:12px}.summary-cell{border:1px solid var(--line);border-radius:8px;padding:10px;background:rgba(255,255,255,.56)}.summary-cell b{display:block;font-size:13px}.summary-cell span{display:block;margin-top:4px;color:var(--muted);font-size:12px;line-height:1.45}
    main{padding:14px 34px 24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px}.card{display:block;text-decoration:none;color:var(--ink);border:1px solid var(--line);border-radius:8px;background:rgba(255,253,246,.92);padding:18px;box-shadow:var(--shadow);transition:.16s transform,.16s border-color}.card:hover{transform:translateY(-2px);border-color:#9aa99f}.city{font-size:24px;font-weight:850;margin-bottom:8px}.meta{color:var(--muted);font-size:13px;line-height:1.65}.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}.kpi{border-top:1px solid var(--line);padding-top:10px}.label{color:var(--muted);font-size:12px}.value{font-size:24px;font-weight:850}.bar{height:8px;background:#e4decd;border-radius:99px;overflow:hidden;margin-top:10px}.seg1{height:100%;background:var(--red);float:left}.seg2{height:100%;background:var(--green);float:left}.note{font-size:12px;color:var(--muted);margin-top:12px}.credit{padding:0 34px 28px;color:var(--muted);font-size:13px;font-weight:700}
    @media(max-width:820px){header,.wrap,main,.credit{padding-left:18px;padding-right:18px}.section-head{display:block}.matrix{min-height:420px;aspect-ratio:auto}.matrix-summary{grid-template-columns:repeat(2,minmax(0,1fr))}.city-dot{max-width:185px}.city-dot .tag{padding:7px 8px}.axis-x-left,.axis-x-right{display:none}}
  </style>
</head>
<body>
  <header><h1>量贩零食城市门店地图</h1><div class="sub">当前已整理的城市样本。点击城市卡片进入可缩放地图，查看门店点位、品牌图层、区县分布和门店搜索。</div></header>
  <section class="wrap">
    <div class="panel matrix-panel">
      <div class="section-head">
        <div><h2>城市样本定位</h2><p>横轴表示城市线级/能级，越右越高；纵轴表示当前样本中的量贩零食竞争程度，越上越强。气泡大小表示量贩门店点位数量。</p></div>
        <div class="matrix-legend"><span class="legend-dot">高竞争样本</span><span class="legend-dot low">低竞争/对照样本</span></div>
      </div>
      <div class="matrix" id="matrix">
        <span class="axis axis-y-top">竞争程度高</span><span class="axis axis-y-bottom">竞争程度低</span>
        <span class="axis axis-x-left">低线城市</span><span class="axis axis-x-right">高线城市</span>
        <span class="quadrant-label q1">高线高竞争</span><span class="quadrant-label q2">低线高竞争</span>
        <span class="quadrant-label q3">低线低竞争</span><span class="quadrant-label q4">高线低竞争</span>
      </div>
      <div class="matrix-summary" id="matrixSummary"></div>
    </div>
  </section>
  <main id="cards"></main>
  <div class="credit">Created by Hammon</div>
  <script>
    const CITIES=[{"city_name": "上海市", "page": "city_maps/shanghai.html", "count": 394, "total_points": 394, "fresh_count": 0, "date": "2026-06-18", "note": "量贩零食为 Suggestion 精扫；新鲜零食为城市探测后区县扩展检索；已做同地址去重。", "group_counts": {"万辰集团量贩零食": 247, "鸣鸣很忙": 147}, "district_counts": {"浦东新区": 82, "嘉定区": 44, "松江区": 42, "宝山区": 37, "闵行区": 37, "奉贤区": 36, "青浦区": 34, "金山区": 30, "崇明区": 18, "普陀区": 14, "杨浦区": 7, "徐汇区": 4, "静安区": 4, "虹口区": 3, "长宁区": 2}, "matrix": {"tier_score": 90, "competition_score": 88, "tier_label": "高线 / 一线", "competition_label": "高竞争", "sample_role": "高线高竞争核心样本"}}, {"city_name": "长沙市", "page": "city_maps/changsha.html", "count": 625, "total_points": 650, "fresh_count": 25, "date": "2026-06-20", "note": "量贩零食为区县级 + 街镇级补扫；新鲜零食为城市探测后扩展检索；已做同地址去重。", "group_counts": {"鸣鸣很忙": 504, "万辰集团量贩零食": 121}, "district_counts": {"长沙县": 95, "岳麓区": 91, "浏阳市": 85, "宁乡市": 74, "雨花区": 70, "望城区": 64, "天心区": 54, "开福区": 50, "芙蓉区": 42}, "matrix": {"tier_score": 78, "competition_score": 84, "tier_label": "高线 / 强省会", "competition_label": "高竞争", "sample_role": "省会高竞争样本"}}, {"city_name": "兰州市", "page": "city_maps/lanzhou.html", "count": 52, "total_points": 52, "fresh_count": 0, "date": "2026-06-21", "note": "量贩零食与新鲜零食为城市级 + 区县级基础检索，并已完成 4188 / 4188 个街镇级补扫请求；已做同地址去重。", "group_counts": {"万辰集团量贩零食": 38, "鸣鸣很忙": 14}, "district_counts": {"城关区": 18, "七里河区": 9, "西固区": 8, "皋兰县": 7, "榆中县": 4, "安宁区": 2, "永登县": 2, "红古区": 2}, "matrix": {"tier_score": 68, "competition_score": 30, "tier_label": "省会 / 中高线", "competition_label": "较低竞争", "sample_role": "高线低竞争对照样本"}}, {"city_name": "邵阳市", "page": "city_maps/shaoyang.html", "count": 173, "total_points": 177, "fresh_count": 4, "date": "2026-06-23", "note": "量贩零食与新鲜零食为城市级 + 区县级探测检索；本轮仅用低额度探测，不做全街镇硬扫，适合作为低门店密度城市的省额度试验样本。", "group_counts": {"鸣鸣很忙": 112, "万辰集团量贩零食": 61}, "district_counts": {"洞口县": 23, "邵东市": 21, "大祥区": 19, "邵阳县": 19, "隆回县": 17, "新邵县": 16, "绥宁县": 13, "双清区": 12, "新宁县": 11, "武冈市": 8, "北塔区": 7, "城步苗族自治县": 7}, "matrix": {"tier_score": 26, "competition_score": 78, "tier_label": "低线 / 下沉", "competition_label": "高竞争", "sample_role": "下沉高竞争样本"}}];
    const maxCount=Math.max(...CITIES.map(city=>city.count||0),1);
    matrix.insertAdjacentHTML("beforeend",CITIES.map(city=>{const m=city.matrix||{}; const size=18+Math.sqrt((city.count||1)/maxCount)*28; const color=(m.competition_score||0)>=60?"#b74335":"#2a6f8f"; return `<a class="city-dot" href="${city.page}" style="left:${m.tier_score||50}%;bottom:${m.competition_score||50}%;--size:${size.toFixed(1)}px;--color:${color}"><span class="bubble"></span><span class="tag"><strong>${city.city_name}</strong><span>${m.tier_label} · ${m.competition_label}<br>${city.count.toLocaleString()} 家量贩门店</span></span></a>`}).join(""));
    const quadrantGroups=[
      ["高线高竞争",city=>city.matrix.tier_score>=50&&city.matrix.competition_score>=50],
      ["低线高竞争",city=>city.matrix.tier_score<50&&city.matrix.competition_score>=50],
      ["高线低竞争",city=>city.matrix.tier_score>=50&&city.matrix.competition_score<50],
      ["低线低竞争",city=>city.matrix.tier_score<50&&city.matrix.competition_score<50],
    ];
    matrixSummary.innerHTML=quadrantGroups.map(([name,predicate])=>{const items=CITIES.filter(predicate); const label=items.length?items.map(city=>city.city_name).join("、"):"待补样本"; return `<div class="summary-cell"><b>${name}</b><span>${label}</span></div>`}).join("");
    cards.innerHTML=CITIES.map(city=>{const mm=city.group_counts["鸣鸣很忙"]||0; const wc=city.group_counts["万辰集团量贩零食"]||0; const total=city.count||1; const districts=Object.keys(city.district_counts).length; return `<a class="card" href="${city.page}"><div class="city">${city.city_name}</div><div class="meta">数据日期：${city.date}<br>${city.note}</div><div class="kpis"><div class="kpi"><div class="label">量贩门店</div><div class="value">${city.count.toLocaleString()}</div></div><div class="kpi"><div class="label">新鲜零食</div><div class="value">${(city.fresh_count||0).toLocaleString()}</div></div><div class="kpi"><div class="label">区县</div><div class="value">${districts}</div></div></div><div class="bar"><div class="seg1" style="width:${mm/total*100}%"></div><div class="seg2" style="width:${wc/total*100}%"></div></div><div class="note">量贩统计：鸣鸣很忙 ${mm} · 万辰集团 ${wc}</div></a>`}).join("");
  </script>
</body>
</html>
