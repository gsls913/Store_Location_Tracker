    const CITIES=DATA.cities||[];
    const PROVINCES=DATA.provinces||[];
    const provinceByName=new Map(PROVINCES.map(p=>[p.province_name,p]));
    const cityByName=new Map(CITIES.map(c=>[c.city_name,c]));
    const provinceAliases={湖南:"湖南省",河南:"河南省",广东:"广东省",甘肃:"甘肃省",北京:"北京市",上海:"上海市"};
    const cityAliases={"湘西土家族苗族自治州":"湘西土家族苗族自治州"};
    let currentProvince=null;
    let selectedCity=null;
    const chart=echarts.init(document.getElementById("geoMap"));
    window.addEventListener("resize",()=>chart.resize());
    renderSide();
    loadChinaMap();
    function canonicalProvince(name){return provinceByName.has(name)?name:(provinceAliases[name]||name);}
    function canonicalCity(name){return cityByName.has(name)?name:(cityAliases[name]||name);}
    async function loadJson(path){const res=await fetch(path); if(!res.ok) throw new Error(path); return res.json();}
    async function loadChinaMap(){const geo=await loadJson("assets/maps/china.json"); echarts.registerMap("china-snack",geo); currentProvince=null; selectedCity=null; backChina.hidden=true; openSelected.hidden=true; mapCaption.textContent="点击已着色省份查看省内城市"; const data=PROVINCES.map(p=>({name:p.province_name,value:p.store_count})); chart.setOption(baseMapOption("china-snack",data,"全国已获取省份",true),true);}
    async function loadProvinceMap(provinceName){const province=provinceByName.get(provinceName); if(!province||!province.adcode)return; currentProvince=province; selectedCity=null; backChina.hidden=false; openSelected.hidden=true; mapCaption.textContent=`${province.province_name}：点击已获取城市进入城市地图`; renderSide(province); const geo=await loadJson(`assets/maps/provinces/${province.adcode}.json`); echarts.registerMap(`province-${province.adcode}`,geo); const data=province.cities.map(c=>({name:c.city_name,value:c.count})); chart.setOption(baseMapOption(`province-${province.adcode}`,data,province.province_name,false),true);}
    function baseMapOption(mapName,data,title,isChina){return {backgroundColor:"#f2efe4",tooltip:{trigger:"item",formatter(params){const name=isChina?canonicalProvince(params.name):canonicalCity(params.name); if(isChina){const p=provinceByName.get(name); return p?`${p.province_name}<br/>已获取城市：${p.city_count}<br/>量贩门店：${p.store_count.toLocaleString()}`:`${params.name}<br/>暂无数据`;} const c=cityByName.get(name); return c?`${c.city_name}<br/>量贩门店：${c.count.toLocaleString()}<br/>点击进入城市页`:`${params.name}<br/>暂无城市页`; }},visualMap:{show:false,min:0,max:Math.max(1,...data.map(d=>d.value||0)),inRange:{color:["#dfe7d8","#8dbb8a","#0f6b4a"]}},series:[{name:title,type:"map",map:mapName,roam:true,selectedMode:false,layoutCenter:["50%","52%"],layoutSize:isChina?"92%":"96%",data:data,itemStyle:{areaColor:"#ece7d8",borderColor:"#c4c9bd",borderWidth:.8},emphasis:{label:{show:true,color:"#102326",fontWeight:800},itemStyle:{areaColor:"#d9b36a"}},label:{show:isChina?false:true,color:"#526164",fontSize:10}}]};}
    chart.on("click",params=>{if(!currentProvince){const provinceName=canonicalProvince(params.name); if(provinceByName.has(provinceName)) loadProvinceMap(provinceName); return;} const cityName=canonicalCity(params.name); const city=cityByName.get(cityName); if(city){window.location.href=city.page;}});
    chart.on("mouseover",params=>{if(currentProvince){const city=cityByName.get(canonicalCity(params.name)); selectedCity=city||null; openSelected.hidden=!selectedCity;}});
    backChina.addEventListener("click",loadChinaMap);
    openSelected.addEventListener("click",()=>{if(selectedCity) window.location.href=selectedCity.page;});
    function renderSide(province=null){if(!province){const totalStores=PROVINCES.reduce((sum,p)=>sum+p.store_count,0); sidePanel.innerHTML=`<h3>已覆盖省份</h3><div class="meta">点击地图上有颜色的省份，进入省内城市分块。当前样本覆盖 ${PROVINCES.length} 个省级区域、${CITIES.length} 个城市。</div><div class="side-kpis"><div class="side-kpi"><b>${totalStores.toLocaleString()}</b><span>量贩门店</span></div><div class="side-kpi"><b>${CITIES.length}</b><span>城市页面</span></div></div><div class="city-list">${PROVINCES.sort((a,b)=>b.store_count-a.store_count).map(p=>`<a class="city-link" href="javascript:void(0)" data-province="${p.province_name}"><strong>${p.province_name}</strong><span>${p.city_count}城 · ${p.store_count.toLocaleString()}店</span></a>`).join("")}</div>`; sidePanel.querySelectorAll("[data-province]").forEach(el=>el.addEventListener("click",()=>loadProvinceMap(el.dataset.province))); return;} sidePanel.innerHTML=`<h3>${province.province_name}</h3><div class="meta">已获取 ${province.city_count} 个城市样本。城市分块中有颜色的区域可点击进入城市门店地图。</div><div class="side-kpis"><div class="side-kpi"><b>${province.store_count.toLocaleString()}</b><span>量贩门店</span></div><div class="side-kpi"><b>${province.fresh_count.toLocaleString()}</b><span>新鲜零食</span></div></div>${province.province_page?`<a class="province-link" href="${province.province_page}">查看${province.province_name}全省门店地图</a>`:""}<div class="city-list">${province.cities.map(city=>`<a class="city-link" href="${city.page}"><strong>${city.city_name}</strong><span>${city.count.toLocaleString()}店</span><span class="city-badge">${city.matrix.tier_label}</span></a>`).join("")}</div>`;}
    const quadrants=[
      ["low_tier_high_competition","三四线高竞争","三线及以下城市里竞争已经较强的样本"],
      ["high_tier_high_competition","高线高竞争","高线城市或强省会中的核心竞争样本"],
      ["low_tier_low_competition","三四线低竞争","未来可补充的三线及以下低竞争对照组"],
      ["high_tier_low_competition","高线低竞争","高能级但当前样本竞争较弱的对照组"],
    ];
    matrix.innerHTML=quadrants.map(([key,title,desc])=>{const items=CITIES.filter(city=>(city.matrix||{}).quadrant===key); return `<section class="quadrant"><h3>${title}</h3><div class="axis-note">${desc}</div><div class="quadrant-body">${items.length?items.map(sampleCard).join(""):`<div class="empty-sample">暂无城市样本</div>`}</div></section>`}).join("");
    function sampleCard(city){const m=city.matrix||{}; const mm=city.group_counts["鸣鸣很忙"]||0; const wc=city.group_counts["万辰集团量贩零食"]||0; return `<a class="sample-card" href="${city.page}"><div class="city-line"><strong>${city.city_name}</strong>${m.province?`<span class="province-pill">${m.province}</span>`:""}</div><span>${m.tier_label} · ${m.competition_label}<br>${m.sample_role}</span><div class="sample-kpis"><b>量贩 ${city.count.toLocaleString()}</b><b>鸣鸣 ${mm}</b><b>万辰 ${wc}</b></div></a>`;}
    cards.innerHTML=CITIES.map(city=>{const m=city.matrix||{}; const mm=city.group_counts["鸣鸣很忙"]||0; const wc=city.group_counts["万辰集团量贩零食"]||0; const total=city.count||1; const districts=Object.keys(city.district_counts).length; return `<a class="card" href="${city.page}"><div class="city-line"><div class="city">${city.city_name}</div>${m.province?`<span class="province-pill">${m.province}</span>`:""}</div><div class="card-subline"><span class="tier-pill">${m.tier_label}</span><span class="competition-pill">${m.competition_label}</span></div><div class="meta">数据日期：${city.date}<br>${city.note}</div><div class="kpis"><div class="kpi"><div class="label">量贩门店</div><div class="value">${city.count.toLocaleString()}</div></div><div class="kpi"><div class="label">新鲜零食</div><div class="value">${(city.fresh_count||0).toLocaleString()}</div></div><div class="kpi"><div class="label">区县</div><div class="value">${districts}</div></div></div><div class="bar"><div class="seg1" style="width:${mm/total*100}%"></div><div class="seg2" style="width:${wc/total*100}%"></div></div><div class="note">量贩统计：鸣鸣很忙 ${mm} · 万辰集团 ${wc}</div></a>`}).join("");
