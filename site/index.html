<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>量贩零食城市门店地图</title>
  <style>
    :root{--ink:#102326;--muted:#647579;--line:#d9ddd5;--paper:#f7f5ed;--panel:#fffdf6;--green:#0f6b4a;--red:#b74335;--gold:#bb7d13;--blue:#2a6f8f;--shadow:0 18px 42px rgba(30,42,35,.14)}
    *{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:"Microsoft YaHei","Noto Sans CJK SC","PingFang SC",sans-serif;letter-spacing:0}
    header{padding:30px 34px 20px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.78),rgba(248,246,238,.9))}h1{margin:0 0 8px;font-size:31px;line-height:1.15}.sub{color:var(--muted);font-size:14px;line-height:1.7}
    .wrap{padding:24px 34px 10px}.panel{border:1px solid var(--line);border-radius:8px;background:rgba(255,253,246,.92);box-shadow:var(--shadow)}.matrix-panel{padding:20px}.section-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:16px}.section-head h2{font-size:21px;line-height:1.2;margin:0 0 6px}.section-head p{margin:0;color:var(--muted);font-size:13px;line-height:1.65}.matrix-legend{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:12px}.legend-dot{display:inline-flex;align-items:center;gap:5px;white-space:nowrap}.legend-dot:before{content:"";width:10px;height:10px;border-radius:50%;background:var(--red);box-shadow:0 0 0 2px #fff,0 0 0 3px rgba(16,35,38,.16)}.legend-dot.low:before{background:var(--blue)}.matrix{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));border:1px solid var(--line);border-radius:8px;background:linear-gradient(90deg,rgba(42,111,143,.05) 0 50%,rgba(15,107,74,.05) 50% 100%),linear-gradient(0deg,rgba(42,111,143,.04) 0 50%,rgba(183,67,53,.06) 50% 100%);overflow:hidden}.quadrant{min-height:210px;padding:16px;border-color:rgba(16,35,38,.16);border-style:solid;border-width:0;display:flex;flex-direction:column;gap:10px}.quadrant:nth-child(1),.quadrant:nth-child(3){border-right-width:1px}.quadrant:nth-child(1),.quadrant:nth-child(2){border-bottom-width:1px}.quadrant-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.quadrant h3{margin:0;font-size:16px;line-height:1.25}.quadrant .axis-note{color:var(--muted);font-size:12px;line-height:1.45}.quadrant-body{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin-top:2px}.sample-card{display:block;text-decoration:none;color:var(--ink);border:1px solid var(--line);border-radius:8px;background:rgba(255,253,246,.86);padding:11px 12px;transition:.16s border-color,.16s transform}.sample-card:hover{transform:translateY(-1px);border-color:#9aa99f}.sample-card strong{display:block;font-size:16px;line-height:1.25}.sample-card span{display:block;margin-top:5px;color:#647579;font-size:12px;line-height:1.45}.sample-kpis{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.sample-kpis b{border-radius:999px;background:#ebe6d7;color:#526164;font-size:12px;padding:3px 7px}.empty-sample{border:1px dashed rgba(100,117,121,.45);border-radius:8px;color:var(--muted);font-size:13px;padding:12px;background:rgba(255,255,255,.42)}.axis-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;margin-top:12px;color:var(--muted);font-size:12px;font-weight:850}.axis-line{height:1px;background:var(--line)}
    main{padding:14px 34px 24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px}.card{display:block;text-decoration:none;color:var(--ink);border:1px solid var(--line);border-radius:8px;background:rgba(255,253,246,.92);padding:18px;box-shadow:var(--shadow);transition:.16s transform,.16s border-color}.card:hover{transform:translateY(-2px);border-color:#9aa99f}.city{font-size:24px;font-weight:850;margin-bottom:8px}.meta{color:var(--muted);font-size:13px;line-height:1.65}.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}.kpi{border-top:1px solid var(--line);padding-top:10px}.label{color:var(--muted);font-size:12px}.value{font-size:24px;font-weight:850}.bar{height:8px;background:#e4decd;border-radius:99px;overflow:hidden;margin-top:10px}.seg1{height:100%;background:var(--red);float:left}.seg2{height:100%;background:var(--green);float:left}.note{font-size:12px;color:var(--muted);margin-top:12px}.credit{padding:0 34px 28px;color:var(--muted);font-size:13px;font-weight:700}
    @media(max-width:820px){header,.wrap,main,.credit{padding-left:18px;padding-right:18px}.section-head{display:block}.matrix{grid-template-columns:1fr}.quadrant{min-height:unset;border-right-width:0!important;border-bottom-width:1px}.quadrant:last-child{border-bottom-width:0}.axis-row{grid-template-columns:1fr}.axis-line{display:none}}
  </style>
</head>
<body>
  <header><h1>量贩零食城市门店地图</h1><div class="sub">当前已整理的城市样本。点击城市卡片进入可缩放地图，查看门店点位、品牌图层、区县分布和门店搜索。</div></header>
  <section class="wrap">
    <div class="panel matrix-panel">
      <div class="section-head">
        <div><h2>城市样本定位</h2><p>横轴表示城市线级/能级，越右越高；纵轴表示当前样本中的量贩零食竞争程度，越上越强。气泡大小表示量贩门店点位数量。</p></div>
        <div class="matrix-legend"><span class="legend-dot">高竞争样本</span><span class="legend-dot low">低竞争/对照样本</span></div>
      </div>
      <div class="matrix" id="matrix"></div>
      <div class="axis-row"><span>左侧：低线/下沉城市</span><span class="axis-line"></span><span style="text-align:right">右侧：高线/省会及以上城市</span></div>
    </div>
  </section>
  <main id="cards"></main>
  <div class="credit">Created by Hammon</div>
  <script>
    const CITIES=[{"city_name": "上海市", "page": "city_maps/shanghai.html", "count": 394, "total_points": 394, "fresh_count": 0, "date": "2026-06-18", "note": "量贩零食为 Suggestion 精扫；新鲜零食为城市探测后区县扩展检索；已做同地址去重。", "group_counts": {"万辰集团量贩零食": 247, "鸣鸣很忙": 147}, "district_counts": {"浦东新区": 82, "嘉定区": 44, "松江区": 42, "宝山区": 37, "闵行区": 37, "奉贤区": 36, "青浦区": 34, "金山区": 30, "崇明区": 18, "普陀区": 14, "杨浦区": 7, "徐汇区": 4, "静安区": 4, "虹口区": 3, "长宁区": 2}, "matrix": {"quadrant": "high_tier_high_competition", "tier_label": "高线 / 一线", "competition_label": "高竞争", "sample_role": "高线高竞争核心样本"}}, {"city_name": "长沙市", "page": "city_maps/changsha.html", "count": 625, "total_points": 650, "fresh_count": 25, "date": "2026-06-20", "note": "量贩零食为区县级 + 街镇级补扫；新鲜零食为城市探测后扩展检索；已做同地址去重。", "group_counts": {"鸣鸣很忙": 504, "万辰集团量贩零食": 121}, "district_counts": {"长沙县": 95, "岳麓区": 91, "浏阳市": 85, "宁乡市": 74, "雨花区": 70, "望城区": 64, "天心区": 54, "开福区": 50, "芙蓉区": 42}, "matrix": {"quadrant": "high_tier_high_competition", "tier_label": "高线 / 强省会", "competition_label": "高竞争", "sample_role": "省会高竞争样本"}}, {"city_name": "兰州市", "page": "city_maps/lanzhou.html", "count": 52, "total_points": 52, "fresh_count": 0, "date": "2026-06-21", "note": "量贩零食与新鲜零食为城市级 + 区县级基础检索，并已完成 4188 / 4188 个街镇级补扫请求；已做同地址去重。", "group_counts": {"万辰集团量贩零食": 38, "鸣鸣很忙": 14}, "district_counts": {"城关区": 18, "七里河区": 9, "西固区": 8, "皋兰县": 7, "榆中县": 4, "安宁区": 2, "永登县": 2, "红古区": 2}, "matrix": {"quadrant": "high_tier_low_competition", "tier_label": "省会 / 中高线", "competition_label": "较低竞争", "sample_role": "高线低竞争对照样本"}}, {"city_name": "邵阳市", "page": "city_maps/shaoyang.html", "count": 173, "total_points": 177, "fresh_count": 4, "date": "2026-06-23", "note": "量贩零食与新鲜零食为城市级 + 区县级探测检索；本轮仅用低额度探测，不做全街镇硬扫，适合作为低门店密度城市的省额度试验样本。", "group_counts": {"鸣鸣很忙": 112, "万辰集团量贩零食": 61}, "district_counts": {"洞口县": 23, "邵东市": 21, "大祥区": 19, "邵阳县": 19, "隆回县": 17, "新邵县": 16, "绥宁县": 13, "双清区": 12, "新宁县": 11, "武冈市": 8, "北塔区": 7, "城步苗族自治县": 7}, "matrix": {"quadrant": "low_tier_high_competition", "tier_label": "低线 / 下沉", "competition_label": "高竞争", "sample_role": "下沉高竞争样本"}}];
    const quadrants=[
      ["low_tier_high_competition","低线高竞争","下沉市场里竞争已经较强的样本"],
      ["high_tier_high_competition","高线高竞争","高线城市或强省会中的核心竞争样本"],
      ["low_tier_low_competition","低线低竞争","未来可补充的下沉低竞争对照组"],
      ["high_tier_low_competition","高线低竞争","高能级但当前样本竞争较弱的对照组"],
    ];
    matrix.innerHTML=quadrants.map(([key,title,desc])=>{const items=CITIES.filter(city=>(city.matrix||{}).quadrant===key); return `<section class="quadrant"><div class="quadrant-head"><div><h3>${title}</h3><div class="axis-note">${desc}</div></div></div><div class="quadrant-body">${items.length?items.map(sampleCard).join(""):`<div class="empty-sample">暂无城市样本</div>`}</div></section>`}).join("");
    function sampleCard(city){const m=city.matrix||{}; const mm=city.group_counts["鸣鸣很忙"]||0; const wc=city.group_counts["万辰集团量贩零食"]||0; return `<a class="sample-card" href="${city.page}"><strong>${city.city_name}</strong><span>${m.tier_label} · ${m.competition_label}<br>${m.sample_role}</span><div class="sample-kpis"><b>量贩 ${city.count.toLocaleString()}</b><b>鸣鸣 ${mm}</b><b>万辰 ${wc}</b></div></a>`;}
    cards.innerHTML=CITIES.map(city=>{const mm=city.group_counts["鸣鸣很忙"]||0; const wc=city.group_counts["万辰集团量贩零食"]||0; const total=city.count||1; const districts=Object.keys(city.district_counts).length; return `<a class="card" href="${city.page}"><div class="city">${city.city_name}</div><div class="meta">数据日期：${city.date}<br>${city.note}</div><div class="kpis"><div class="kpi"><div class="label">量贩门店</div><div class="value">${city.count.toLocaleString()}</div></div><div class="kpi"><div class="label">新鲜零食</div><div class="value">${(city.fresh_count||0).toLocaleString()}</div></div><div class="kpi"><div class="label">区县</div><div class="value">${districts}</div></div></div><div class="bar"><div class="seg1" style="width:${mm/total*100}%"></div><div class="seg2" style="width:${wc/total*100}%"></div></div><div class="note">量贩统计：鸣鸣很忙 ${mm} · 万辰集团 ${wc}</div></a>`}).join("");
  </script>
</body>
</html>
