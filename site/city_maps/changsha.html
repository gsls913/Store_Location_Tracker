    const colors = {"万辰集团量贩零食 / 好想来":"#0f6b4a","万辰集团量贩零食 / 老婆大人":"#bb7d13","鸣鸣很忙 / 零食很忙":"#b74335","鸣鸣很忙 / 赵一鸣零食":"#2a6f8f","鸣鸣很忙 / 鸣鸣很忙":"#7b4ea3"};
    const fallback="#4f5f62";
    const map=L.map("map",{zoomControl:true,preferCanvas:true}).setView(DATA.center,11);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"&copy; OpenStreetMap"}).addTo(map);
    L.control.scale({position:"bottomleft", metric:true, imperial:false, maxWidth:180}).addTo(map);
    document.getElementById("title").textContent=`${DATA.city_name}量贩零食门店地图`;
    document.getElementById("subtitle").textContent=`数据日期：${DATA.date}。${DATA.note} 数据源：${DATA.source}`;
    const layers=new Map(), markers=[], markersByUid=new Map();
    let activePairLine=null;
    for(const point of DATA.points){const key=`${point.group} / ${point.subbrand}`; if(!layers.has(key)) layers.set(key,L.layerGroup().addTo(map)); const marker=L.circleMarker([point.lat,point.lng],{radius:point.group==="万辰集团量贩零食"?6:5.5,color:"#fff",weight:1.7,fillColor:colors[key]||fallback,fillOpacity:.88}); const confidence=point.confidence?`<br>识别置信度：${esc(point.confidence==="high"?"高":point.confidence)}`:""; const tags=[point.rating?`<span class="pill" style="background:${colors[key]||fallback}">评分：${esc(point.rating)}</span>`:"",point.business_hours?`<span class="pill" style="background:${colors[key]||fallback}">营业时间：${esc(point.business_hours)}</span>`:""].join(""); marker.bindPopup(`<div class="popup-title">${esc(point.name)}</div><div class="popup-meta">${esc(point.group)} / ${esc(point.subbrand)}<br>${esc(point.district)} · ${esc(point.address)}<br>UID: ${esc(point.uid)}${confidence}</div>${tags}`); marker.storePoint=point; marker.addTo(layers.get(key)); markers.push(marker); markersByUid.set(point.uid, marker);}
    if(markers.length) map.fitBounds(L.featureGroup(markers).getBounds().pad(.08));
    totalStores.textContent=DATA.count.toLocaleString(); districtTotal.textContent=Object.keys(DATA.district_counts).length; wanchengroup.textContent=DATA.points.filter(p=>p.group==="万辰集团量贩零食").length; mingming.textContent=DATA.points.filter(p=>p.group==="鸣鸣很忙").length;
    for(const [key,layer] of layers.entries()){const count=DATA.points.filter(p=>`${p.group} / ${p.subbrand}`===key).length; const color=colors[key]||fallback; const id=`toggle-${key.replace(/\W/g,"")}`; toggles.insertAdjacentHTML("beforeend",`<label class="toggle-row" for="${id}"><span><span class="dot" style="background:${color}"></span>${esc(key)} · ${count}</span><input id="${id}" type="checkbox" checked data-layer="${esc(key)}"/></label>`); legend.insertAdjacentHTML("beforeend",`<div class="legend-row"><span class="dot" style="background:${color}"></span>${esc(key)}</div>`);}
    toggles.addEventListener("change",e=>{const input=e.target;if(!input.dataset.layer)return;const layer=layers.get(input.dataset.layer);input.checked?layer.addTo(map):layer.removeFrom(map);});
    const maxDistrict=Math.max(...Object.values(DATA.district_counts)); for(const [district,count] of Object.entries(DATA.district_counts)){districtBars.insertAdjacentHTML("beforeend",`<div style="margin:9px 0"><div style="display:flex;justify-content:space-between;font-size:12px"><span>${esc(district)}</span><b>${count}</b></div><div style="height:7px;background:#e4decd;border-radius:99px;overflow:hidden"><div style="height:100%;width:${count/maxDistrict*100}%;background:#0f6b4a"></div></div></div>`);}
    function renderList(term=""){const normalized=term.trim().toLowerCase(); const matches=DATA.points.filter(p=>`${p.name} ${p.district} ${p.address} ${p.group} ${p.subbrand}`.toLowerCase().includes(normalized)).slice(0,100); storeList.innerHTML=matches.map(p=>`<button class="store" data-uid="${esc(p.uid)}"><strong>${esc(p.name)}</strong><span>${esc(p.district)} · ${esc(p.group)} / ${esc(p.subbrand)}</span></button>`).join("");}
    renderList(); search.addEventListener("input",()=>renderList(search.value)); storeList.addEventListener("click",e=>{const button=e.target.closest("button[data-uid]"); if(!button)return; const marker=markers.find(m=>m.storePoint.uid===button.dataset.uid); if(!marker)return; map.setView(marker.getLatLng(),15,{animate:true}); marker.openPopup();});
    renderPairList(crossPairList, DATA.nearest_pairs.cross_group);
    renderPairList(samePairList, DATA.nearest_pairs.same_group);
    document.querySelectorAll(".pair-list").forEach(list=>list.addEventListener("click",e=>{const button=e.target.closest("button[data-left]"); if(!button)return; focusPair(button.dataset.left, button.dataset.right);}));
    function renderPairList(el,pairs){el.innerHTML=pairs.map((pair,i)=>`<button class="store pair" data-left="${esc(pair.left_uid)}" data-right="${esc(pair.right_uid)}"><strong>${i+1}. ${formatDistance(pair.distance_m)} · ${esc(pair.left_district)} / ${esc(pair.right_district)}</strong><span>${esc(pair.left_name)}<br>${esc(pair.right_name)}</span></button>`).join("");}
    function focusPair(leftUid,rightUid){const left=markersByUid.get(leftUid), right=markersByUid.get(rightUid); if(!left||!right)return; const latlngs=[left.getLatLng(), right.getLatLng()]; if(activePairLine) activePairLine.remove(); activePairLine=L.polyline(latlngs,{color:"#102326",weight:3,opacity:.72,dashArray:"6 6"}).addTo(map); map.fitBounds(L.latLngBounds(latlngs).pad(.35),{animate:true,maxZoom:17}); left.openPopup(); setTimeout(()=>right.openPopup(),450);}
    function formatDistance(m){return m>=1000?`${(m/1000).toFixed(2)} km`:`${Math.round(m)} m`;}
    function esc(v){return String(v??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));}
  </script>
