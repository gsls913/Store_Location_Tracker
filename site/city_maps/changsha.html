    function buildEnvironmentLayers(){envInfoAnchor.innerHTML=infoIcon("环境图层",["商业设施与城市功能网格来自 OpenStreetMap Overpass API。","人口密度、夜间活跃度当前提供 OSM 代理热力层。","代理层只用于空间观察，不等同于真实人口或夜光栅格。"]); metricInfoAnchor.innerHTML=infoIcon("环境指标",["500m/1km 近商业设施门店用于观察门店是否更贴近商业中心。","最近商业设施中位距离越低，说明样本门店整体更贴近商场、市场或大型商业载体。","功能网格分布用于判断门店更多落在商业、居住、办公还是活跃型区域。"]); if(env.status!=="ready"){envStatus.textContent=env.message||"环境图层待生成"; envMetrics.innerHTML=`<div class="metric"><b>-</b><span>商业设施</span></div><div class="metric"><b>-</b><span>功能网格</span></div>`; envMetricNote.textContent="人口密度热力图与夜间活跃度需要导入 WorldPop/GHSL、VIIRS 栅格后启用。"; envMethodNote.innerHTML=""; return;} const summary=env.summary||{}; const maxScores=gridMaxScores(env.function_grid||[]); const gridRectangles=[]; let opacityScale=1; const mallIcon='<span class="mall-svg"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="8" width="14" height="12" rx="2.2" fill="#eaf7fb" stroke="#2a6f8f" stroke-width="1.8"/><path d="M9 8c0-2 1.2-3.5 3-3.5S15 6 15 8" fill="none" stroke="#2a6f8f" stroke-width="1.8" stroke-linecap="round"/><path d="M8 12h8M8 15h8" stroke="#0f6b4a" stroke-width="1.5" stroke-linecap="round"/><circle cx="9" cy="20.5" r="1.2" fill="#2a6f8f"/><circle cx="15" cy="20.5" r="1.2" fill="#2a6f8f"/></svg></span>'; const commercialLayer=L.layerGroup(); for(const f of env.commercial_facilities||[]){const marker=L.marker([f.lat,f.lng],{icon:L.divIcon({className:"mall-div-icon",html:mallIcon,iconSize:[26,26],iconAnchor:[13,14]})}); marker.bindPopup(`<div class="popup-title">${esc(f.name||"商业设施")}</div><div class="popup-table"><b>类型</b><span>商业设施 / ${esc(f.category)}</span><b>来源</b><span>OpenStreetMap</span><b>标签</b><span>${esc(JSON.stringify(f.tags))}</span></div>`); marker.addTo(commercialLayer);} const gridLayer=L.layerGroup(); for(const cell of env.function_grid||[]){const [s,w,n,e]=cell.bounds; const rect=L.rectangle([[s,w],[n,e]],{stroke:false,fillColor:functionColor(cell.dominant_function),fillOpacity:gridOpacity(cell,maxScores,opacityScale)}); rect.envCell=cell; rect.bindTooltip(gridTooltipHtml(cell),{sticky:true,className:"grid-tooltip",direction:"top",opacity:1}); rect.addTo(gridLayer); gridRectangles.push(rect);} const rasters=env.raster_layers||{}; const populationLayer=buildRasterGridLayer(rasters.population_density,"#d7a928","人口密度"); const nightLayer=buildRasterGridLayer(rasters.night_activity,"#34446c","夜间活跃度"); envLayers.set("商业设施点位", commercialLayer); envLayers.set("城市功能网格", gridLayer); envLayers.set("人口密度热力图", populationLayer); envLayers.set("夜间活跃度", nightLayer); addEnvToggle("商业设施点位",commercialLayer,`<span class="map-symbol mall"></span>商业设施点位 · ${summary.commercial_facility_count||0} ${infoIcon("商业设施点位",["来源为 OpenStreetMap Overpass API。","包括购物中心、商超、市场、百货、商业建筑等公开地图要素。","用于观察门店与主要商业载体的空间关系。"])}`,false); addEnvToggle("城市功能网格",gridLayer,`<span class="map-symbol grid" style="background:#b8c7aa"></span>城市功能网格 · ${summary.function_grid_count||0} ${infoIcon("城市功能网格",["把城市切成约 1km 网格，并按当前城市同类最高值归一化颜色。","商业强：购物中心、商超、市场、百货、餐饮、银行等商业/消费要素。","居住强：住宅建筑、便利店、学校、社区生活服务等居住代理要素。","办公强：office、商业楼宇、银行、餐饮等通勤/办公代理要素。","活跃强：餐饮、市场、商业设施、公园等人流活动代理要素。"])}`,false,false,`<button class="layer-tool-btn" id="gridOpacityButton" type="button" title="调整网格颜色强度">调色</button>`); envToggles.insertAdjacentHTML("beforeend",`<div class="layer-popover" id="gridOpacityPopover" hidden><label><span>网格颜色强度</span><span id="gridOpacityValue">100%</span></label><input id="gridOpacitySlider" class="env-slider" type="range" min="45" max="160" value="100" step="5"></div>`); const opacityButton=document.getElementById("gridOpacityButton"); const opacityPopover=document.getElementById("gridOpacityPopover"); const opacitySlider=document.getElementById("gridOpacitySlider"); const opacityValue=document.getElementById("gridOpacityValue"); opacityButton.addEventListener("click",event=>{event.preventDefault();event.stopPropagation();opacityPopover.hidden=!opacityPopover.hidden;}); opacityPopover.addEventListener("click",event=>event.stopPropagation()); opacitySlider.addEventListener("input",()=>{opacityScale=Number(opacitySlider.value)/100; opacityValue.textContent=`${opacitySlider.value}%`; gridRectangles.forEach(rect=>rect.setStyle({fillOpacity:gridOpacity(rect.envCell,maxScores,opacityScale)}));}); addEnvToggle("人口密度热力图",populationLayer,`<span class="map-symbol grid" style="background:#d7a928"></span>人口密度热力图 · ${populationLayer?(rasters.population_density?.is_proxy?"代理":"已导入"):"待导入"} ${infoIcon("人口密度热力图",["计划接入 WorldPop 或 GHSL 人口栅格，当前若显示为代理，则不是官方真实人口栅格。","代理网格值 = 居住强度 + 0.25 × 商业强度 + 0.15 × 当前网格门店数。","门店气泡中的人口代理值 = 所在网格居住强度 + 0.25 × 商业强度。","代理值越高，表示该位置更像居住人口承载区；仅用于城市内部相对比较。"])}`,false,!populationLayer,populationLayer?`<button class="layer-tool-btn" id="populationOpacityButton" type="button" title="调整人口密度热力图颜色强度">调色</button>`:""); if(populationLayer) envToggles.insertAdjacentHTML("beforeend",`<div class="layer-popover" id="populationOpacityPopover" hidden><label><span>人口热力颜色强度</span><span id="populationOpacityValue">100%</span></label><input id="populationOpacitySlider" class="env-slider" type="range" min="45" max="180" value="100" step="5"></div>`); addEnvToggle("夜间活跃度",nightLayer,`<span class="map-symbol grid" style="background:#34446c"></span>夜间活跃度 · ${nightLayer?(rasters.night_activity?.is_proxy?"代理":"已导入"):"待导入"} ${infoIcon("夜间活跃度",["计划接入 VIIRS 夜间灯光月度合成数据，当前若显示为代理，则不是官方真实夜光栅格。","代理网格值 = 活跃代理 + 0.45 × 商业强度 + 0.25 × 办公强度 + 0.10 × 当前网格门店数。","门店气泡中的夜间代理值 = 所在网格活跃代理 + 0.45 × 商业强度 + 0.25 × 办公强度。","代理值越高，表示该位置更像夜间消费和人流活动较强区域；仅用于城市内部相对比较。"])}`,false,!nightLayer,nightLayer?`<button class="layer-tool-btn" id="nightOpacityButton" type="button" title="调整夜间活跃度颜色强度">调色</button>`:""); if(nightLayer) envToggles.insertAdjacentHTML("beforeend",`<div class="layer-popover" id="nightOpacityPopover" hidden><label><span>夜间热力颜色强度</span><span id="nightOpacityValue">100%</span></label><input id="nightOpacitySlider" class="env-slider" type="range" min="45" max="180" value="100" step="5"></div>`); bindRasterOpacityControl("populationOpacityButton","populationOpacityPopover","populationOpacitySlider","populationOpacityValue",populationLayer); bindRasterOpacityControl("nightOpacityButton","nightOpacityPopover","nightOpacitySlider","nightOpacityValue",nightLayer); envStatus.textContent=`商业设施与功能网格来自 OpenStreetMap Overpass API；人口密度和夜间活跃度当前可用代理层，真实栅格需后续导入 WorldPop/GHSL/VIIRS。`; envMetrics.innerHTML=`<div class="metric"><b>${(summary.commercial_facility_count||0).toLocaleString()}</b><span>商业设施点位</span></div><div class="metric"><b>${(summary.stores_within_500m_commercial||0).toLocaleString()}</b><span>500m内近商业设施门店</span></div><div class="metric"><b>${(summary.stores_within_1000m_commercial||0).toLocaleString()}</b><span>1km内近商业设施门店</span></div><div class="metric"><b>${summary.median_nearest_commercial_distance_m?formatDistance(summary.median_nearest_commercial_distance_m):"-"}</b><span>最近商业设施中位距离</span></div>`; envMetricNote.textContent=`门店功能网格分布：${Object.entries(summary.dominant_function_store_counts||{}).map(([k,v])=>`${functionLabel(k)} ${v}`).join(" · ")||"暂无"}`; envMethodNote.innerHTML="";}
    function addEnvToggle(key,layer,label,checked=false,disabled=false,extra=""){envToggles.insertAdjacentHTML("beforeend",`<label class="toggle-row" for="env-${esc(key)}"><span class="layer-name">${label}</span>${extra}<input id="env-${esc(key)}" type="checkbox" ${checked?"checked":""} ${disabled?"disabled":""} data-env-layer="${esc(key)}"/></label>`); if(layer&&checked) layer.addTo(map);}
    function buildRasterGridLayer(layer,color,label){if(!layer||layer.status!=="ready"||!Array.isArray(layer.cells)||!layer.cells.length)return null; const max=Math.max(...layer.cells.map(cell=>Number(cell.value||0)))||1; const group=L.layerGroup(); group._rasterRectangles=[]; const displayLabel=layer.is_proxy?`${label}代理`:label; for(const cell of layer.cells){const [s,w,n,e]=cell.bounds; const value=Number(cell.value||0); const opacity=Math.max(.08,Math.min(.7,.12+.52*Math.sqrt(value/max))); const rect=L.rectangle([[s,w],[n,e]],{stroke:false,fillColor:color,fillOpacity:opacity}); rect.rasterBaseOpacity=opacity; rect.bindTooltip(`<div class="grid-tip"><div class="grid-tip-title">${esc(displayLabel)}</div><div class="grid-tip-row" style="color:${color}"><span>数值</span><b>${esc(value.toFixed?value.toFixed(2):value)}</b></div><div class="grid-tip-row"><span>来源</span><b>${esc(layer.source||"真实栅格")}</b></div></div>`,{sticky:true,className:"grid-tooltip",direction:"top",opacity:1}); rect.addTo(group); group._rasterRectangles.push(rect);} return group;}
    function bindRasterOpacityControl(buttonId,popoverId,sliderId,valueId,layer){const button=document.getElementById(buttonId); const popover=document.getElementById(popoverId); const slider=document.getElementById(sliderId); const value=document.getElementById(valueId); if(!button||!popover||!slider||!value||!layer)return; button.addEventListener("click",event=>{event.preventDefault();event.stopPropagation();popover.hidden=!popover.hidden;}); popover.addEventListener("click",event=>event.stopPropagation()); slider.addEventListener("input",()=>{const scale=Number(slider.value)/100; value.textContent=`${slider.value}%`; (layer._rasterRectangles||[]).forEach(rect=>rect.setStyle({fillOpacity:Math.max(.04,Math.min(.88,(rect.rasterBaseOpacity||.18)*scale))}));});} function toggleLayerGroup(container,datasetKey,layerMap,button){if(activePairFocus) clearPairFocus(); const inputs=activeLayerInputs(container,datasetKey); const allChecked=inputs.length&&inputs.every(input=>input.checked); inputs.forEach(input=>{input.checked=!allChecked; const layer=layerMap.get(input.dataset[datasetKey]); if(!layer)return; input.checked?layer.addTo(map):layer.removeFrom(map);}); updateToggleAllButton(container,datasetKey,button);}
    function updateToggleAllButton(container,datasetKey,button){const inputs=activeLayerInputs(container,datasetKey); const allChecked=inputs.length&&inputs.every(input=>input.checked); button.textContent=allChecked?"全不选":"全选"; button.disabled=!inputs.length;}
    function activeLayerInputs(container,datasetKey){return [...container.querySelectorAll(`input[data-${dashCase(datasetKey)}]`)].filter(input=>!input.disabled);}
    function dashCase(value){return value.replace(/[A-Z]/g,letter=>`-${letter.toLowerCase()}`);}
    function gridMaxScores(cells){const max={residential:0,commercial:0,office:0,activity:0}; for(const cell of cells){const key=cell.dominant_function; if(max[key]!=null) max[key]=Math.max(max[key],scoreForFunction(cell,key));} for(const key of Object.keys(max)) max[key]=max[key]||1; return max;}
    function scoreForFunction(cell,key){return key==="residential"?Number(cell.residential_index||0):key==="commercial"?Number(cell.commercial_index||0):key==="office"?Number(cell.office_index||0):key==="activity"?Number(cell.activity_proxy_index||0):0;}
    function gridOpacity(cell,maxScores,scale){const key=cell.dominant_function; const normalized=Math.sqrt(Math.min(1,scoreForFunction(cell,key)/(maxScores[key]||1))); return Math.max(.12,Math.min(.72,(.18+.38*normalized)*scale));}
    function gridTooltipHtml(cell){return `<div class="grid-tip"><div class="grid-tip-title">${functionTag(cell.dominant_function)}</div>${gridTipRow("商业强度",cell.commercial_index,"commercial")}${gridTipRow("居住强度",cell.residential_index,"residential")}${gridTipRow("办公强度",cell.office_index,"office")}${gridTipRow("活跃代理",cell.activity_proxy_index,"activity")}<div class="grid-tip-row"><span>OSM要素 / 门店</span><b>${esc(cell.poi_count)} / ${esc(cell.store_count)}</b></div></div>`;}
    function gridTipRow(label,value,key){const color=functionColor(key); return `<div class="grid-tip-row" style="color:${color}"><span>${label}</span><b>${esc(value)}</b></div>`;}
    function functionTag(name){return `<span class="grid-tag" style="background:${functionColor(name)}">${functionLabel(name)}</span>`;}
    function infoIcon(title,items){return `<span class="info-wrap" tabindex="0"><span class="info-dot">i</span><span class="info-pop"><b>${esc(title)}</b><ul>${items.map(item=>`<li>${esc(item)}</li>`).join("")}</ul></span></span>`;}
    function methodHtml(ready){return "";}
    function functionColor(name){return {residential:"#4f9a52",commercial:"#d98418",office:"#386fb4",activity:"#8b58a5"}[name]||"#9aa99f";}
    function functionLabel(name){return {residential:"居住强",commercial:"商业强",office:"办公强",activity:"活跃强"}[name]||"未识别";}
    function esc(v){return String(v??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));}
    function cssEsc(v){return String(v).replace(/\\/g,"\\\\").replace(/"/g,'\\"');}
  </script>
