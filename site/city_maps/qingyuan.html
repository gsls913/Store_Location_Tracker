    function renderList(term=""){const normalized=term.trim().toLowerCase(); const matches=DATA.points.filter(p=>`${p.name} ${p.district} ${p.address} ${p.group} ${p.subbrand}`.toLowerCase().includes(normalized)).slice(0,100); storeList.innerHTML=matches.map(p=>`<button class="store" data-uid="${esc(p.uid)}"><strong>${esc(p.name)}</strong><span>${esc(p.district)} · ${esc(p.group)} / ${esc(p.subbrand)}</span></button>`).join("");}
    renderList(); search.addEventListener("input",()=>renderList(search.value)); storeList.addEventListener("click",e=>{const button=e.target.closest("button[data-uid]"); if(!button)return; const marker=markers.find(m=>m.storePoint.uid===button.dataset.uid); if(!marker)return; map.setView(marker.getLatLng(),15,{animate:true}); marker.openPopup();});
    renderPairList(crossPairList, DATA.nearest_pairs.cross_group);
    renderPairList(samePairList, DATA.nearest_pairs.same_group);
    renderPairList(freshPairList, DATA.nearest_pairs.fresh_vs_volume);
    document.querySelectorAll(".pair-list").forEach(list=>list.addEventListener("click",e=>{const button=e.target.closest("button[data-left]"); if(!button)return; focusPair(button.dataset.left, button.dataset.right);}));
    const pairSets={cross:DATA.nearest_pairs.cross_group,same:DATA.nearest_pairs.same_group,fresh:DATA.nearest_pairs.fresh_vs_volume};
    document.querySelectorAll("[data-pair-focus]").forEach(button=>{button.disabled=!pairSets[button.dataset.pairFocus].length; if(button.disabled) button.textContent="暂无样本"; button.addEventListener("click",()=>togglePairFocus(button.dataset.pairFocus, pairSets[button.dataset.pairFocus]));});
    function renderPairList(el,pairs){el.innerHTML=pairs.length?pairs.map((pair,i)=>`<button class="store pair" data-left="${esc(pair.left_uid)}" data-right="${esc(pair.right_uid)}"><strong>第${i+1}组 · ${formatDistance(pair.distance_m)} · ${esc(pair.left_district)} / ${esc(pair.right_district)}</strong><span>${esc(pair.left_group)} / ${esc(pair.left_subbrand)}：${esc(pair.left_name)}<br>${esc(pair.right_group)} / ${esc(pair.right_subbrand)}：${esc(pair.right_name)}</span></button>`).join(""):`<div class="store"><span>暂无样本</span></div>`;}
    function focusPair(leftUid,rightUid){const left=markersByUid.get(leftUid), right=markersByUid.get(rightUid); if(!left||!right)return; const latlngs=[left.getLatLng(), right.getLatLng()]; if(activePairLine) activePairLine.remove(); activePairLine=L.polyline(latlngs,{color:"#102326",weight:3,opacity:.72,dashArray:"6 6"}).addTo(map); map.fitBounds(L.latLngBounds(latlngs).pad(.45),{animate:true,maxZoom:19}); left.openPopup(); setTimeout(()=>right.openPopup(),450);}
    function togglePairFocus(kind,pairs){if(activePairFocus===kind){clearPairFocus();return;} clearPairFocus(false); activePairFocus=kind; document.querySelectorAll("[data-pair-focus]").forEach(btn=>{const on=btn.dataset.pairFocus===kind; btn.classList.toggle("active",on); if(!btn.disabled) btn.textContent=on?"恢复全部":"只看这组";}); layers.forEach(layer=>map.removeLayer(layer)); if(activePairLine){activePairLine.remove(); activePairLine=null;} const uids=new Set(); pairs.forEach(pair=>{uids.add(pair.left_uid);uids.add(pair.right_uid);}); const visibleMarkers=[...uids].map(uid=>markersByUid.get(uid)).filter(Boolean); visibleMarkers.forEach(marker=>marker.addTo(map)); activeTopLines=pairs.map(pair=>{const left=markersByUid.get(pair.left_uid), right=markersByUid.get(pair.right_uid); if(!left||!right)return null; return L.polyline([left.getLatLng(),right.getLatLng()],{color:"#102326",weight:2.6,opacity:.76,dashArray:"5 7"}).addTo(map);}).filter(Boolean); if(visibleMarkers.length) map.fitBounds(L.featureGroup([...visibleMarkers,...activeTopLines]).getBounds().pad(.28),{animate:true,maxZoom:16});}
    function clearPairFocus(restoreLayers=true){activeTopLines.forEach(line=>line.remove()); activeTopLines=[]; if(activePairLine){activePairLine.remove(); activePairLine=null;} if(activePairFocus){const activeUids=new Set(Object.values(pairSets).flat().flatMap(pair=>[pair.left_uid,pair.right_uid])); activeUids.forEach(uid=>{const marker=markersByUid.get(uid); if(marker) map.removeLayer(marker);});} activePairFocus=null; document.querySelectorAll("[data-pair-focus]").forEach(btn=>{btn.classList.remove("active"); if(!btn.disabled) btn.textContent="只看这组";}); if(restoreLayers) layers.forEach((layer,key)=>{const input=document.querySelector(`input[data-layer="${cssEsc(key)}"]`); if(!input||input.checked) layer.addTo(map);});}
    function formatDistance(m){return `${Math.round(m).toLocaleString()} m`;}
    function mapSymbol(key,color){return key.startsWith("新鲜零食")?`<span class="map-symbol triangle" style="color:${esc(color)}">▲</span>`:`<span class="map-symbol circle" style="background:${esc(color)}"></span>`;}
    function sortedLayerEntries(){return Array.from(layers.entries()).sort(([a],[b])=>layerSortKey(a).localeCompare(layerSortKey(b),"zh-Hans-CN"));}
    function layerSortKey(key){const [group,subbrandRaw=""]=key.split(" / "); const groupOrder={"万辰集团量贩零食":1,"鸣鸣很忙":2,"新鲜零食":9}; const subbrandOrder={"好想来":1,"老婆大人":2,"来优品":3,"陆小馋":4,"零食很忙":1,"赵一鸣零食":2,"鸣鸣很忙":3,"一栗nutco":1,"几多全":2,"金粒门":3,"蒲妈妈":4,"久食山":5}; const subbrand=subbrandRaw.trim(); return `${String(groupOrder[group]||8).padStart(2,"0")}-${String(subbrandOrder[subbrand]||50).padStart(2,"0")}-${key}`;}
    function storePopupHtml(point,fill,envInfo){const confidence=point.confidence?point.confidence==="high"?"高":point.confidence:""; const rows=[["品牌",`${esc(point.group)} / ${esc(point.subbrand)}`],["区县",esc(point.district)],["地址",esc(point.address)],["UID",esc(point.uid),"compact"]]; if(confidence) rows.push(["识别置信度",esc(confidence)]); if(envInfo){rows.push(["最近商业设施",`${esc(envInfo.nearest_commercial_name||"暂无")} ${envInfo.nearest_commercial_distance_m!=null?`(${formatDistance(envInfo.nearest_commercial_distance_m)})`:""}`]); rows.push(["功能网格",`${functionTag(envInfo.dominant_function)} 商业 ${esc(envInfo.commercial_index)} / 居住 ${esc(envInfo.residential_index)} / 办公 ${esc(envInfo.office_index)}`]);} const tags=[point.rating?`<span class="pill" style="background:${fill}">评分 ${esc(point.rating)}</span>`:"",point.business_hours?`<span class="pill" style="background:${fill}">营业 ${esc(point.business_hours)}</span>`:""].join(""); return `<div class="popup-title">${esc(point.name)}</div><div class="popup-table">${rows.map(([k,v,cls])=>`<b>${k}</b><span class="popup-value ${cls||""}">${v}</span>`).join("")}</div>${tags?`<div class="popup-tags">${tags}</div>`:""}`;}
    function buildEnvironmentLayers(){envInfoAnchor.innerHTML=infoIcon("环境图层",["商业设施与城市功能网格来自 OpenStreetMap Overpass API。","城市功能网格用于观察门店附近更偏商业、居住、办公还是活跃型区域。","环境图层只保留可解释的商业设施点位与城市功能网格。"]); metricInfoAnchor.innerHTML=infoIcon("环境指标",["500m/1km 近商业设施门店用于观察门店是否更贴近商业中心。","最近商业设施中位距离越低，说明样本门店整体更贴近商场、市场或大型商业载体。","功能网格分布用于判断门店更多落在商业、居住、办公还是活跃型区域。"]); if(env.status!=="ready"){envStatus.textContent=env.message||"环境图层待生成"; envMetrics.innerHTML=`<div class="metric"><b>-</b><span>商业设施</span></div><div class="metric"><b>-</b><span>功能网格</span></div>`; envMetricNote.textContent="环境图层需要先生成 OpenStreetMap 商业设施与功能网格。"; envMethodNote.innerHTML=""; return;} const summary=env.summary||{}; const maxScores=gridMaxScores(env.function_grid||[]); const gridRectangles=[]; let opacityScale=1; const mallIcon='<span class="mall-svg"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="8" width="14" height="12" rx="2.2" fill="#eaf7fb" stroke="#2a6f8f" stroke-width="1.8"/><path d="M9 8c0-2 1.2-3.5 3-3.5S15 6 15 8" fill="none" stroke="#2a6f8f" stroke-width="1.8" stroke-linecap="round"/><path d="M8 12h8M8 15h8" stroke="#0f6b4a" stroke-width="1.5" stroke-linecap="round"/><circle cx="9" cy="20.5" r="1.2" fill="#2a6f8f"/><circle cx="15" cy="20.5" r="1.2" fill="#2a6f8f"/></svg></span>'; const commercialLayer=L.layerGroup(); for(const f of env.commercial_facilities||[]){const marker=L.marker([f.lat,f.lng],{icon:L.divIcon({className:"mall-div-icon",html:mallIcon,iconSize:[26,26],iconAnchor:[13,14]})}); marker.bindPopup(`<div class="popup-title">${esc(f.name||"商业设施")}</div><div class="popup-table"><b>类型</b><span>商业设施 / ${esc(f.category)}</span><b>来源</b><span>OpenStreetMap</span><b>标签</b><span>${esc(JSON.stringify(f.tags))}</span></div>`); marker.addTo(commercialLayer);} const gridLayer=L.layerGroup(); for(const cell of env.function_grid||[]){const [s,w,n,e]=cell.bounds; const rect=L.rectangle([[s,w],[n,e]],{stroke:false,fillColor:functionColor(cell.dominant_function),fillOpacity:gridOpacity(cell,maxScores,opacityScale)}); rect.envCell=cell; rect.bindTooltip(gridTooltipHtml(cell),{sticky:true,className:"grid-tooltip",direction:"top",opacity:1}); rect.addTo(gridLayer); gridRectangles.push(rect);} envLayers.set("商业设施点位", commercialLayer); envLayers.set("城市功能网格", gridLayer); addEnvToggle("商业设施点位",commercialLayer,`<span class="map-symbol mall"></span>商业设施点位 · ${summary.commercial_facility_count||0} ${infoIcon("商业设施点位",["来源为 OpenStreetMap Overpass API。","包括购物中心、商超、市场、百货、商业建筑等公开地图要素。","用于观察门店与主要商业载体的空间关系。"])}`,false); addEnvToggle("城市功能网格",gridLayer,`<span class="map-symbol grid" style="background:#b8c7aa"></span>城市功能网格 · ${summary.function_grid_count||0} ${infoIcon("城市功能网格",["把城市切成约 1km 网格，并按当前城市同类最高值归一化颜色。","商业强：购物中心、商超、市场、百货、餐饮、银行等商业/消费要素。","居住强：住宅建筑、便利店、学校、社区生活服务等居住代理要素。","办公强：office、商业楼宇、银行、餐饮等通勤/办公代理要素。","活跃强：餐饮、市场、商业设施、公园等人流活动代理要素。"])}`,false,false,`<button class="layer-tool-btn" id="gridOpacityButton" type="button" title="调整网格颜色强度">调色</button>`); envToggles.insertAdjacentHTML("beforeend",`<div class="layer-popover" id="gridOpacityPopover" hidden><label><span>网格颜色强度</span><span id="gridOpacityValue">100%</span></label><input id="gridOpacitySlider" class="env-slider" type="range" min="45" max="160" value="100" step="5"></div>`); const opacityButton=document.getElementById("gridOpacityButton"); const opacityPopover=document.getElementById("gridOpacityPopover"); const opacitySlider=document.getElementById("gridOpacitySlider"); const opacityValue=document.getElementById("gridOpacityValue"); opacityButton.addEventListener("click",event=>{event.preventDefault();event.stopPropagation();opacityPopover.hidden=!opacityPopover.hidden;}); opacityPopover.addEventListener("click",event=>event.stopPropagation()); opacitySlider.addEventListener("input",()=>{opacityScale=Number(opacitySlider.value)/100; opacityValue.textContent=`${opacitySlider.value}%`; gridRectangles.forEach(rect=>rect.setStyle({fillOpacity:gridOpacity(rect.envCell,maxScores,opacityScale)}));});  envStatus.textContent=`商业设施与城市功能网格来自 OpenStreetMap Overpass API。`; envMetrics.innerHTML=`<div class="metric"><b>${(summary.commercial_facility_count||0).toLocaleString()}</b><span>商业设施点位</span></div><div class="metric"><b>${(summary.stores_within_500m_commercial||0).toLocaleString()}</b><span>500m内近商业设施门店</span></div><div class="metric"><b>${(summary.stores_within_1000m_commercial||0).toLocaleString()}</b><span>1km内近商业设施门店</span></div><div class="metric"><b>${summary.median_nearest_commercial_distance_m?formatDistance(summary.median_nearest_commercial_distance_m):"-"}</b><span>最近商业设施中位距离</span></div>`; envMetricNote.textContent=`门店功能网格分布：${Object.entries(summary.dominant_function_store_counts||{}).map(([k,v])=>`${functionLabel(k)} ${v}`).join(" · ")||"暂无"}`; envMethodNote.innerHTML="";}
    function addEnvToggle(key,layer,label,checked=false,disabled=false,extra=""){envToggles.insertAdjacentHTML("beforeend",`<label class="toggle-row" for="env-${esc(key)}"><span class="layer-name">${label}</span>${extra}<input id="env-${esc(key)}" type="checkbox" ${checked?"checked":""} ${disabled?"disabled":""} data-env-layer="${esc(key)}"/></label>`); if(layer&&checked) layer.addTo(map);}
    function toggleLayerGroup(container,datasetKey,layerMap,button){if(activePairFocus) clearPairFocus(); const inputs=activeLayerInputs(container,datasetKey); const allChecked=inputs.length&&inputs.every(input=>input.checked); inputs.forEach(input=>{input.checked=!allChecked; const layer=layerMap.get(input.dataset[datasetKey]); if(!layer)return; input.checked?layer.addTo(map):layer.removeFrom(map);}); updateToggleAllButton(container,datasetKey,button);}
    function updateToggleAllButton(container,datasetKey,button){const inputs=activeLayerInputs(container,datasetKey); const allChecked=inputs.length&&inputs.every(input=>input.checked); button.textContent=allChecked?"全不选":"全选"; button.disabled=!inputs.length;}
    function activeLayerInputs(container,datasetKey){return [...container.querySelectorAll(`input[data-${dashCase(datasetKey)}]`)].filter(input=>!input.disabled);}
    function dashCase(value){return value.replace(/[A-Z]/g,letter=>`-${letter.toLowerCase()}`);}
    function gridMaxScores(cells){const max={residential:0,commercial:0,office:0,activity:0}; for(const cell of cells){const key=cell.dominant_function; if(max[key]!=null) max[key]=Math.max(max[key],scoreForFunction(cell,key));} for(const key of Object.keys(max)) max[key]=max[key]||1; return max;}
    function scoreForFunction(cell,key){return key==="residential"?Number(cell.residential_index||0):key==="commercial"?Number(cell.commercial_index||0):key==="office"?Number(cell.office_index||0):key==="activity"?Number(cell.activity_proxy_index||0):0;}
    function gridOpacity(cell,maxScores,scale){const key=cell.dominant_function; const normalized=Math.sqrt(Math.min(1,scoreForFunction(cell,key)/(maxScores[key]||1))); return Math.max(.12,Math.min(.72,(.18+.38*normalized)*scale));}
    function gridTooltipHtml(cell){return `<div class="grid-tip"><div class="grid-tip-title">${functionTag(cell.dominant_function)}</div>${gridTipRow("商业强度",cell.commercial_index,"commercial")}${gridTipRow("居住强度",cell.residential_index,"residential")}${gridTipRow("办公强度",cell.office_index,"office")}${gridTipRow("活跃代理",cell.activity_proxy_index,"activity")}<div class="grid-tip-row"><span>OSM要素 / 门店</span><b>${esc(cell.poi_count)} / ${esc(cell.store_count)}</b></div></div>`;}
    function gridTipRow(label,value,key){const color=functionColor(key); return `<div class="grid-tip-row" style="color:${color}"><span>${label}</span><b>${esc(value)}</b></div>`;}
    function functionTag(name){return `<span class="grid-tag" style="background:${functionColor(name)}">${functionLabel(name)}</span>`;}
    function infoIcon(title,items){return `<span class="info-wrap" tabindex="0"><span class="info-dot">i</span><span class="info-pop"><b>${esc(title)}</b><ul>${items.map(item=>`<li>${esc(item)}</li>`).join("")}</ul></span></span>`;}
    function methodHtml(ready){return "";}
    function functionColor(name){return {residential:"#4f9a52",commercial:"#d98418",office:"#386fb4",activity:"#8b58a5"}[name]||"#9aa99f";}
    function functionLabel(name){return {residential:"居住强",commercial:"商业强",office:"办公强",activity:"活跃强"}[name]||"未识别";}
    function esc(v){return String(v??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));}
    function cssEsc(v){return String(v).replace(/\\/g,"\\\\").replace(/"/g,'\\"');}
  </script>
</body>
